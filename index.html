<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Title -->
    <title>ClockPy</title>

    <!-- Favicon -->
    <link rel="icon" href="./img/favicon.ico">

    <!-- Bootstrap CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Weather Icons (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">

    <!-- FontAwesome Icons (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Stylesheet (Must be loaded last for proper cascade) -->
    <link rel="stylesheet" href="./distr/css/main.css">

</head>

<body>
    <section>
        <div class="container h-100">
            <div class="row h-100">
                <div class="col-12 col-md-6 col-lg-6 col-xl-6">

                    <div class="row align-items-center city">
                        <div class="col-12" id="city">
                            <i class="wi wi-na"></i>
                        </div>
                    </div>

                    <div class="row align-items-center clock">
                        <div class="col-12" id="clock">
                            <i class="wi wi-na"></i>
                        </div>
                    </div>

                    <div class="row align-items-center date">
                        <div class="col-12" id="date">
                            <i class="wi wi-na"></i>
                        </div>
                    </div>

                    <div class="row align-items-center" id="sunupdown">
                        <div class="col-6" id="sun">
                            <i class="wi wi-na"></i>
                        </div>

                        <div class="col-6" id="sun-time">
                            <i class="wi wi-na"></i>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-6 col-xl-6">

                    <div class="row align-items-center weather">
                        <div class="col-12" id="weather">
                            <i class="wi wi-na"></i>
                        </div>
                    </div>

                    <div class="row align-items-center temperature">
                        <div class="col-3" id="temperature-icon">
                            <i class="wi wi-thermometer"> </i>
                        </div>

                        <div class="col-6" id="temperature">
                            <i class="wi wi-na"></i>
                        </div>

                        <div class="col-3" id="celsius-icon">
                            <i class="wi wi-celsius"> </i>
                        </div>
                    </div>

                    <div class="row align-items-center humidity-box">
                        <div class="col-6" id="humidity-icon">
                            <i class="wi wi-humidity"> </i>
                        </div>

                        <div class="col-6">
                            <div id="humidity">
                                <i class="wi wi-na"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="clearfix"></div>

    </section>

    <!-- **** All JS Files ***** -->
    <!-- jQuery (CDN) -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>

    <!-- Bootstrap JS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Main Application Script -->
    <script type="text/javascript" src="./distr/js/main.js"></script>
</body>

</html>
